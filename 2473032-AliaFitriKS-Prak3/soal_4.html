<!DOCTYPE html>

<html>
    <head>
        <title>2473032-Alia Fitri Khairunisa Siswati</title>
    </head>
    <body>
        <form>
            <table style="border: 1px solid black; padding-right: 15px;">
                <tr>
                    <td colspan="3" align="left"><h2>Form Tambah Data User</h2></td>
                </tr>
                <tr>
                    <td>Name</td>
                    <td>:</td>
                    <td>
                        <input type="text" name="name" oninvalid="this.setCustomValidity('Name is required!!!')" oninput="this.setCustomValidity('')" required>
                    </td>
                </tr>
                <tr>
                    <td>Address</td>
                    <td>:</td>
                    <td>
                        <input type="text" name="address" oninvalid="this.setCustomValidity('Address is required!!!')" oninput="this.setCustomValidity('')" required>
                    </td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td>:</td>
                    <td>
                        <input type="email" name="email" oninvalid="this.setCustomValidity('Sertakan ‘@’ pada alamat email ini. '+ this.value +' tidak memiliki ‘@’.')" oninput="this.setCustomValidity('')" required>
                    </td>
                </tr>
                <tr>
                    <td>Home Page</td>
                    <td>:</td>
                    <td>
                        <input type="url" name="homepage">
                    </td>
                </tr>
                <tr>
                    <td>Birthday</td>
                    <td>:</td>
                    <td>
                        <input type="date" name="birthday">
                    </td>
                </tr>
                <tr>
                    <td>Favorite Color</td>
                    <td>:</td>
                    <td>
                        <input type="color" name="color">
                    </td>
                </tr>
                <tr>
                    <td>ipk</td>
                    <td>:</td>
                    <td>
                        <input type="number" name="ipk" min="0" max="4" step="0.1" value="0">
                    </td>
                </tr>
                <tr>
                    <td>Phone Number</td>
                    <td>:</td>
                    <td>
                        <input type="text" name="pnumber" pattern="\d{3}-\d{7,10}" placeholder="###-#######">
                    </td>
                </tr>
                <tr>
                    <td colspan="3" align="center">
                        <input type="submit" value="add">
                    </td>
                </tr>
            </table>
        </form>
    </body>
</html>
