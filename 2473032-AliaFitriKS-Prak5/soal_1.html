<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473032-Alia Fitri Khairunisa Siswati</title>
    <style>
        .box{
        position: relative;
        display: inline-block;
        }
        .sudut{
            width: 20px;
            height: 20px;
            border: 5px solid #FF0000;
            position: absolute;
        }
        .kiriatas{ top:0; left:0; border-right:none; border-bottom:none; }
        .kananatas{ top:0; right:0; border-left:none; border-bottom:none; }
        .bawahkiri{ bottom:0; left:0; border-right:none; border-top:none; }
        .bawahkanan{ bottom:0; right:0; border-left:none; border-top:none; }
        img{
            width: 150px;
        }
        a:hover .sudut{
            border-color: #FF00FF;
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <td>
                <a href="#">
                    <div class="box">
                        <img src="src/src/star.jpg">
                        <div class="sudut kiriatas"></div>
                        <div class="sudut kananatas"></div>
                        <div class="sudut bawahkiri"></div>
                        <div class="sudut bawahkanan"></div>
                    </div>
                </a>
            </td>
        </tr>
    </table>
</body>
</html>
