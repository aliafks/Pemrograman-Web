<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473032-Alia Fitri Khairunisa Siswati</title>
    <style>
        table{
            border-collapse: collapse;
            margin-top: 10px;
        }
        td{
            border: 2px solid black;
            height: 20px;
            width: 20px;
            font-size: 30px;
        }
        button{
            padding: 5px 10px;
        }
    </style>
    <script>
        function angka(){
            let input1 = parseInt(document.getElementById("input1").value);
            let input2 = parseInt(document.getElementById("input2").value);
            if(isNaN(input1) && isNaN(input2)){
                alert("angka pertama dan kedua harus angka");
                return;
            }
            else if(isNaN(input1)){
                alert("angka pertama bukan angka");
                return;
            }
            else if(isNaN(input2)){
                alert("angka kedua harus angka");
                return;
            }
            let angka1 = parseInt(input1);
            let angka2 = parseInt(input2);
            document.getElementById("a1").innerHTML = angka1;
            document.getElementById("a2").innerHTML = angka2;
            document.getElementById("hasilTambah").innerHTML = angka1 + angka2;

            document.getElementById("b1").innerHTML = angka1;
            document.getElementById("b2").innerHTML = angka2;
            document.getElementById("hasilKurang").innerHTML = angka1 - angka2;
        }
    </script>
</head>
<body>
    Angka Pertama :
    <input type="text" id="input1"> 
    <br>
    Angka Kedua : 
    <input type="text" id="input2">
    <br>
    <button onclick="angka()">Count</button>
    <table border="1" cellpadding="30">
        <tr>
            <td id="a1"></td>
            <td>+</td>
            <td id="a2"></td>
            <td>=</td>
            <td id="hasilTambah"></td>
        </tr>
        <tr>
            <td id="b1"></td>
            <td>-</td>
            <td id="b2"></td>
            <td>=</td>
            <td id="hasilKurang"></td>
        </tr>
    </table>
</body>
</html>
