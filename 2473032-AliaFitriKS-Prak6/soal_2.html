<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473032-Alia Fitri Khairunisa Siswati</title>
    <style>
    table{
        border: 1;
        margin-top: 20px;
        border-style: outset;
        border-color: black;
    }
    td{
        border: 2px solid black;
        width: 20px;
        height: 40px;
        text-align: center;
        font-size: 20px;
    }
    </style>
</head>
<body>
    <table id="tabel"></table>
    <script>
    let input;
    while(true){
        input = prompt("Masukkan angka:");
        if(input !== null && !isNaN(input) && input.trim() !== ""){
            break;
        }
    }
    let angka = parseInt(input);
    let hasil = "";
    for(let i = 1; i <= angka; i++){
        hasil += "<tr>";
        hasil += "<td>" + i + "</td>";
        hasil += "<td>x</td>";
        hasil += "<td>" + angka + "</td>";
        hasil += "<td>=</td>";
        hasil += "<td>" + (i * angka) + "</td>";
        hasil += "</tr>";
    }
    document.getElementById("tabel").innerHTML = hasil;
    </script>
</body>
</html>
