<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2473032-Alia Fitri Khairunisa Siswati</title>
    <style>
        table{
            border-collapse: collapse;
            margin-top: 10px;

        }
        td{
            width: 30px;
            height: 50px;
        }
        .container{
            width: 800;
            height: 600;
        }
        .warnatabel{
            background: orange;
            border: 1px solid white;
        }
    </style>
    <script>
        function piramida(){
            let tinggi = parseInt(document.getElementById("tinggi").value);
            let hasil = "";
            for(let i = 1; i <= tinggi; i++){
                hasil += "<tr>";
                for(let j = 1; j <= tinggi - i; j++){
                    hasil += "<td></td>";
                }
                for(let k = 1; k <= (2*i - 1); k++){
                    hasil += "<td class='warnatabel'></td>";
                }
                hasil += "</tr>";
            }

            document.getElementById("hasil").innerHTML = hasil;
        }
    </script>
</head>
<body>
    <input type="text" id="tinggi">
    <br>
    <button onclick="piramida()">Proses</button>
    <div class="container">
    <table id="hasil"></table>
    </div>
</body>
</html>
